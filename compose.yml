services:
  nova-nginx:
    image: nginx:alpine
    container_name: nova-nginx
    ports:
      - "127.0.0.1:17492:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - nova-frontend
      - nova-backend
    networks:
      - nova-network
    restart: unless-stopped

  nova-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: nova-frontend:latest
    pull_policy: build
    container_name: nova-frontend
    networks:
      - nova-network
    restart: unless-stopped
    expose:
      - "3000"

  nova-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nova-backend:latest
    pull_policy: build
    container_name: nova-backend
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:17492}
      - NOVA_BASE_URL=${NOVA_BASE_URL:-http://localhost:17492}
      - REDIS_HOST=${REDIS_HOST:-}
      - REDIS_PORT=${REDIS_PORT:-6379}
    networks:
      - nova-network
    restart: unless-stopped
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  nova-network:
    name: nova-network
    driver: bridge
